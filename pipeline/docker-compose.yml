version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cdc-zookeeper
    networks:
      - cdc-net
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"   # Cho phép tất cả 4lw commands (ruok, stat, mntr...)
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    # Tạm tắt healthcheck vì whitelist gây khó khăn
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cdc-kafka
    networks:
      - cdc-net
    depends_on:
      zookeeper:
        condition: service_healthy      # đổi từ service_healthy → service_started
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: cdc-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://cdc-kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 80s

  # ================== Các service còn lại giữ nguyên ==================
  mysql:
    image: mysql:8.0
    container_name: cdc-mysql
    networks:
      - cdc-net
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory
      MYSQL_ROOT_HOST: "%"
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    volumes:
      - mysql_data:/var/lib/mysql
      - ../demo/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  mongodb:
    image: mongo:7.0
    container_name: cdc-mongodb
    networks:
      - cdc-net
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7
    container_name: cdc-redis
    networks:
      - cdc-net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  debezium:
    image: debezium/connect:2.5
    container_name: cdc-debezium
    networks:
      - cdc-net
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: cdc-kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      OFFSET_FLUSH_INTERVAL_MS: 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

  spark-master:
    image: cdc-spark:3.5.0
    build:
      context: ../spark
      dockerfile: Dockerfile
    container_name: cdc-spark-master
    networks:
      - cdc-net
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:                     # 👈 THÊM DÒNG NÀY
      - ../jobs:/opt/spark/jobs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  spark-worker-1:
    image: cdc-spark:3.5.0
    build:
      context: ../spark
      dockerfile: Dockerfile
    container_name: cdc-spark-worker-1
    networks:
      - cdc-net
    depends_on:
      spark-master:
        condition: service_healthy
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://cdc-spark-master:7077
    ports:
      - "8081:8081"
    volumes:                     # 👈 THÊM DÒNG NÀY
      - ../jobs:/opt/spark/jobs

  spark-worker-2:
    image: cdc-spark:3.5.0
    build:
      context: ../spark
      dockerfile: Dockerfile
    container_name: cdc-spark-worker-2
    networks:
      - cdc-net
    depends_on:
      spark-master:
        condition: service_healthy
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://cdc-spark-master:7077
    ports:
      - "8082:8081"
    volumes:                     # 👈 THÊM DÒNG NÀY
      - ../jobs:/opt/spark/jobs


  prometheus:
    image: prom/prometheus:latest
    container_name: cdc-prometheus
    networks:
      - cdc-net
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: cdc-grafana
    networks:
      - cdc-net
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  mysql_data:
  mongodb_data:
  zookeeper_data:
  kafka_data:

networks:
  cdc-net:
    driver: bridge
